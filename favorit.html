<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorit - Digital Library FST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f7f5ee;
        }
        .retro-border { border: 2px solid #000000; }
        .hard-shadow { box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1); }
        .sidebar-active { background-color: #555555; border-top: 2px solid #000000; border-bottom: 2px solid #000000; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f7f5ee; border-left: 2px solid #000000; }
        ::-webkit-scrollbar-thumb { background: #bbbbbb; border: 2px solid #000000; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <div class="w-full min-h-screen flex flex-col md:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-64 bg-[#3f3f3f] text-white flex flex-col justify-between border-b-2 md:border-b-0 md:border-r-2 border-black shrink-0 md:h-screen md:sticky md:top-0 z-20">
            <div>
                <div class="p-4 flex items-center space-x-3 border-b-2 border-black">
                    <img src="Logo FST 1(1).png" alt="Logo UIN FST" class="w-12 h-12 object-contain">
                    <div class="font-extrabold text-sm tracking-tight leading-none">
                        <span class="block text-white text-base">Digital</span>
                        <span class="block text-gray-300 text-base mt-1">Library</span>
                    </div>
                </div>

                <nav class="mt-4 flex flex-col font-bold text-sm">
                    <a href="dashboard_user.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-[#4d4d4d] transition-all"><span class="w-8 h-8 bg-amber-500 rounded-full flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-house"></i></span><span>Dashboard</span></a>
                    <a href="koleksi_buku.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-[#4d4d4d] transition-all"><span class="w-8 h-8 bg-[#ff6b6b] rounded-md flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-book"></i></span><span>Koleksi Buku</span></a>
                    <a href="koleksi_ebook.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-[#4d4d4d] transition-all"><span class="w-8 h-8 bg-amber-400 rounded-md flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-file-invoice"></i></span><span>Koleksi e-book</span></a>
                    <a href="riwayat.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-[#4d4d4d] transition-all"><span class="w-8 h-8 bg-cyan-400 rounded-full flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-clock-rotate-left"></i></span><span>Riwayat</span></a>
                    <a href="favorit.html" class="sidebar-active flex items-center space-x-3 px-6 py-4 transition-all"><span class="w-8 h-8 bg-yellow-400 rounded-full flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-star"></i></span><span>Favorit</span></a>
                    <a href="profil.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-[#4d4d4d] transition-all"><span class="w-8 h-8 bg-amber-300 rounded-full flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-user"></i></span><span>Profil</span></a>
                </nav>
            </div>
            <div class="border-t-2 border-black bg-[#333333]">
                <a href="login.html" class="flex items-center space-x-3 px-6 py-4 hover:bg-red-900/40 transition-all font-bold text-sm text-red-300"><span class="w-8 h-8 bg-slate-300 rounded-full flex items-center justify-center border-2 border-black text-black text-xs"><i class="fa-solid fa-arrow-right-from-bracket"></i></span><span>log-out</span></a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0 bg-[#f7f5ee]">
            <header class="bg-[#e5ebed] border-b-2 border-black p-4 px-6 flex items-center justify-between shrink-0">
            <div>
                <h2 class="text-xl sm:text-2xl font-extrabold text-black">Halo, User</h2>
                <p class="text-[11px] font-bold text-gray-600 mt-1">Apa yang ingin kamu baca hari ini?</p>
            </div>
            <div class="flex items-center space-x-4">
                <button class="relative w-10 h-10 bg-white rounded-full border-2 border-black flex items-center justify-center hover:bg-gray-100 transition shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                    <i class="fa-solid fa-bell text-black text-lg"></i>
                    <span class="absolute top-1 right-1 w-3 h-3 bg-amber-500 rounded-full border border-black"></span>
                </button>
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-slate-400 border-2 border-black overflow-hidden">
                    <!-- Tambahkan id="header-avatar" di sini -->
                            <img id="header-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=120" alt="Avatar" class="w-full h-full object-cover">

                            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=120" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </header>

            <div class="p-6 md:p-8 space-y-12 overflow-y-auto flex-1">
                <section>
                    <h2 class="text-lg font-black uppercase mb-6 border-b border-black pb-2">Daftar Buku Favorit</h2>
                    <div id="favorit-buku-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
                </section>

                <section class="pb-12">
                    <h2 class="text-lg font-black uppercase mb-6 border-b border-black pb-2">Daftar E-book Favorit</h2>
                    <div id="favorit-ebook-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function loadFavorit() {
            const favs = JSON.parse(localStorage.getItem('userFavorites')) || [];
            const buku = favs.filter(f => f.type === 'buku');
            const ebook = favs.filter(f => f.type === 'ebook');

            renderSection('favorit-buku-grid', buku, 'detail_buku.html?id=');
            renderSection('favorit-ebook-grid', ebook, 'detail_ebook.html?id=');
        }

        function renderSection(id, list, linkBase) {
            const grid = document.getElementById(id);
            if(list.length === 0) {
                grid.innerHTML = '<p class="text-xs font-bold text-gray-500 italic">Belum ada item favorit.</p>';
                return;
            }
            grid.innerHTML = list.map(b => `
                <div class="flex flex-col group">
                    <a href="${linkBase}${b.id}" class="bg-white rounded-lg retro-border p-3 shadow-[2px_2px_0px_rgba(0,0,0,1)] transition-all flex flex-col hover:-translate-y-1">
                        <div class="w-full aspect-[3/4] bg-gradient-to-br ${b.color} rounded-md border border-black flex items-center justify-center p-2 text-center">
                            <span class="text-[9px] font-black uppercase">${b.title}</span>
                        </div>
                        <h4 class="text-[10px] font-black mt-2 truncate">${b.title}</h4>
                    </a>
                    <button onclick="hapusFavorit(${b.id})" class="mt-2 text-[10px] font-black text-red-600 hover:underline"><i class="fa-solid fa-trash mr-1"></i> Hapus</button>
                </div>
            `).join('');
        }

        function hapusFavorit(id) {
            let favs = JSON.parse(localStorage.getItem('userFavorites')) || [];
            favs = favs.filter(f => f.id !== id);
            localStorage.setItem('userFavorites', JSON.stringify(favs));
            loadFavorit();
        }

    // Tarik foto dari local storage dan terapkan ke avatar header
    window.addEventListener('DOMContentLoaded', () => {
        const savedAvatar = localStorage.getItem('userAvatar');
        const headerAvatar = document.getElementById('header-avatar');
        if (savedAvatar && headerAvatar) {
            headerAvatar.src = savedAvatar;
        }
    });
        window.onload = loadFavorit;
    </script>
</body>
</html>
